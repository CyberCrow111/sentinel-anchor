<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crow-Tech Command Core</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: radial-gradient(circle at top, #0a0f1c, #000);
    color: #00eaff;
    text-align: center;
}

/* HEADER */
h1 {
    margin: 20px;
    font-size: 26px;
    text-shadow: 0 0 15px #00eaff;
}

/* GRID */
.grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 15px;
    padding: 20px;
}

/* BUTTON */
.btn {
    padding: 20px;
    border-radius: 15px;
    background: rgba(10,15,28,0.9);
    border: 1px solid #00eaff;
    box-shadow: 0 0 10px #00eaff33;
    font-size: 18px;
    cursor: pointer;
    transition: 0.25s;
    backdrop-filter: blur(5px);
}

.btn:hover {
    background: #00eaff22;
    box-shadow: 0 0 25px #00eaff;
    transform: scale(1.05);
}

/* GLOW PANEL */
.panel {
    margin: 15px;
    padding: 10px;
    border: 1px solid #00eaff44;
    border-radius: 10px;
    box-shadow: 0 0 10px #00eaff22 inset;
}

/* STATUS */
.status {
    font-size: 12px;
    opacity: 0.6;
}

/* PULSE ANIMATION */
@keyframes pulse {
    0% { box-shadow: 0 0 5px #00eaff; }
    50% { box-shadow: 0 0 20px #00eaff; }
    100% { box-shadow: 0 0 5px #00eaff; }
}

.core {
    animation: pulse 2s infinite;
}
</style>
</head>

<body>

<h1 class="core">⚡ Crow-Tech Command Core</h1>

<div class="panel">
<div class="status">SYSTEM STATUS: ONLINE</div>
</div>

<div class="grid">

<button class="btn" onclick="runPrompt('Create 4 unique Crow-Tech designs, futuristic, neon blue energy, trenchcoat armor, high detail')">
⚙️ CREATE ASSETS
</button>

<button class="btn" onclick="runPrompt('Turn this idea into a structured plan with steps and execution strategy')">
🧠 PROCESS IDEA
</button>

<button class="btn" onclick="runPrompt('Generate monetization ideas and fastest way to make money from this')">
💰 MONEY MOVE
</button>

<button class="btn" onclick="runPrompt('Optimize my workflow, remove friction, increase speed and leverage')">
🤖 SENTINEL
</button>

<button class="btn" onclick="openLink('https://github.com/')">
🗂️ SYSTEMS
</button>

</div>

<div class="panel">
<div class="status">Crow-Tech Systems Active</div>
</div>

<script>
function runPrompt(text) {
    const url = "https://chat.openai.com/?prompt=" + encodeURIComponent(text);
    window.open(url, '_blank');
}

function openLink(url) {
    window.open(url, '_blank');
}
</script>

</body>
</html>
